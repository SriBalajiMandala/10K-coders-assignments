<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Task</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f2f2f2;
            text-align:center;
            padding:20px;
        }

        h1{
            color:#2c3e50;
            margin-bottom:20px;
        }

        .buttons{
            margin-bottom:20px;
        }

        .buttons a{
            display:inline-block;
            text-decoration:none;
            background:#3498db;
            color:white;
            padding:10px 20px;
            margin:10px;
            border-radius:8px;
            font-weight:bold;
        }

        .buttons a:hover{
            background:#21618c;
        }

        iframe{
            width:90%;
            height:500px;
            border:4px solid #3498db;
            border-radius:10px;
            background:white;
        }
    </style>
</head>
<body>

<h1>HTML Iframe Example</h1>

<div class="buttons">

    <a href="https://picsum.photos/900/500" target="frame">
        🖼 Image
    </a>

    <a href="https://www.w3schools.com/html/horse.mp3" target="frame">
        🎵 Audio
    </a>

    <a href="https://www.w3schools.com/html/mov_bbb.mp4" target="frame">
        🎬 Video
    </a>

    <a href="https://10kcoders.com/" target="frame">
        💻 10K Coders
    </a>

</div>

<iframe name="frame"></iframe>

</body>
</html>
